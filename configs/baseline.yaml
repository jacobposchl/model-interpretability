# Stage 1 — Baseline: no consistency loss.
# Train a standard ResNet18 on CIFAR-10 and attach the meta-encoder with
# a contrastive (NT-Xent) objective only. Establishes how much semantic
# structure exists in the circuit space of a normally-trained model.

experiment:
  name: baseline_cifar10
  stage: 1

model:
  arch: resnet18
  num_classes: 10
  pretrained: false
  meta_encoder:
    hidden_dim: 256
    embedding_dim: 64
    encoder_type: mlp    # mlp or transformer
  soft_mask:
    init_temperature: 1.0   # irrelevant for baseline but kept for API consistency

data:
  dataset: cifar10
  data_dir: ./data/raw
  batch_size: 128
  num_workers: 4
  augment: true

training:
  paired: false           # standard (non-paired) data loader
  epochs: 100
  optimizer: adamw
  lr: 1e-3
  weight_decay: 1e-4

  lambda_consistency:
    init: 0.0
    final: 0.0            # no consistency loss
    warmup_epochs: 0

  temperature:
    init: 1.0
    final: 1.0            # no annealing in baseline
    anneal_epochs: 100

  consistency_loss:
    weight_scheme: linear
    distance: l2
    gradient_checkpointing: false

logging:
  checkpoint_dir: ./experiments/baseline
  log_interval: 50
  save_every: 10
