# SimCLR SSL baseline.
# NT-Xent loss on circuit embeddings (z from MetaEncoder). No circuit
# consistency loss. Serves as the primary comparison baseline for CTLS-SSL.
#
# Larger batch size (256) benefits NT-Xent: more in-batch negatives per anchor
# improve the contrastive signal without requiring a memory bank.

experiment:
  name: simclr_cifar10
  stage: ssl_simclr

model:
  arch: resnet18
  num_classes: 10          # retained for backbone API; head unused during SSL
  pretrained: false
  meta_encoder:
    hidden_dim: 256
    embedding_dim: 64
    encoder_type: mlp
  soft_mask:
    init_temperature: 1.0  # no tau annealing for SimCLR

data:
  dataset: cifar10
  data_dir: ./data/raw
  batch_size: 256
  num_workers: 4
  download: true

training:
  method: simclr
  epochs: 200
  optimizer: adamw
  lr: 3.0e-4
  weight_decay: 1.0e-4
  simclr_temperature: 0.1   # NT-Xent temperature

logging:
  checkpoint_dir: ./experiments/ssl/simclr
  log_interval: 50
  save_every: 20

evaluation:
  linear_probe_epochs: 100
  knn_k: 20
  fewshot:
    n_way: 5
    k_shot: [1, 5]
    n_episodes: 600
    cifar100_split: novel
