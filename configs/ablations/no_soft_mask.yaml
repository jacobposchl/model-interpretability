# Ablation — no soft masking (hard binary activations via post-ReLU only).
# Identical to ctls.yaml except temperature is held at a near-zero value
# throughout training, effectively disabling the soft mask and using raw
# post-activation values in the trajectory.
# Tests whether the continuous magnitude weighting contributes measurably
# to circuit latent space quality.

experiment:
  name: ctls_no_soft_mask_cifar10
  stage: 4

model:
  arch: resnet18
  num_classes: 10
  pretrained: false
  meta_encoder:
    hidden_dim: 256
    embedding_dim: 64
    encoder_type: mlp
  soft_mask:
    init_temperature: 0.01   # near-binary from the start

data:
  dataset: cifar10
  data_dir: ./data/raw
  batch_size: 128
  num_workers: 4
  augment: true

training:
  paired: true
  epochs: 100
  optimizer: adamw
  lr: 1e-3
  weight_decay: 1e-4

  lambda_consistency:
    init: 0.0
    final: 1.0
    warmup_epochs: 10

  temperature:
    init: 0.01               # start near-binary
    final: 0.01              # no annealing — held constant
    anneal_epochs: 100

  consistency_loss:
    weight_scheme: linear
    gradient_checkpointing: false

logging:
  checkpoint_dir: ./experiments/ablations/no_soft_mask
  log_interval: 50
  save_every: 10
